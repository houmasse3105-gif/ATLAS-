<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Atlas Water Solutions</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ════════════════════════════════════════
     LOGIN PAGE
════════════════════════════════════════ -->
<div class="login-page" id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C12 2 7 9 7 13.5C7 16.54 9.24 19 12 19C14.76 19 17 16.54 17 13.5C17 9 12 2 12 2Z" fill="#00AEEF"/>
        </svg>
      </div>
      <div class="login-logo-text">Atlas <em>Water</em></div>
    </div>
    <div class="login-sub">Admin Dashboard — Sign in to continue</div>

    <div class="lfield">
      <label>Username</label>
      <input type="text" id="l-user" placeholder="admin" value="admin" autocomplete="username">
    </div>
    <div class="lfield">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err">Invalid username or password</div>
  </div>
</div>

<!-- ════════════════════════════════════════
     DASHBOARD
════════════════════════════════════════ -->
<div id="dash">

  <!-- Topbar -->
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">Atlas <em>Water</em></div>
      <div class="tb-tag">Admin Dashboard</div>
    </div>
    <div class="tb-right">
      <span class="tb-user" id="tb-username">admin</span>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <!-- Body -->
  <div class="dash-body">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card s-total">
        <div class="stat-val" id="s-total">—</div>
        <div class="stat-lbl">Total Requests</div>
      </div>
      <div class="stat-card s-new">
        <div class="stat-val" id="s-new">—</div>
        <div class="stat-lbl">New</div>
      </div>
      <div class="stat-card s-prog">
        <div class="stat-val" id="s-prog">—</div>
        <div class="stat-lbl">In Progress</div>
      </div>
      <div class="stat-card s-done">
        <div class="stat-val" id="s-done">—</div>
        <div class="stat-lbl">Completed</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-head">
        <div class="table-title">Service Requests</div>
        <div class="controls">
          <input
            class="search-box" id="search-box"
            placeholder="Search by name, phone, code..."
            oninput="onSearch()"
          >
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn"        onclick="setFilter('new',this)">New</button>
          <button class="filter-btn"        onclick="setFilter('in_progress',this)">In Progress</button>
          <button class="filter-btn"        onclick="setFilter('done',this)">Completed</button>
          <button class="refresh-btn"       onclick="loadRequests()">↻ Refresh</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Client</th>
              <th>Service</th>
              <th>Note</th>
              <th>Date</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="req-tbody">
            <tr><td colspan="7" class="loading-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="table-foot">
        <span id="req-count">—</span>
      </div>
    </div>

  </div><!-- /dash-body -->
</div><!-- /dash -->

<!-- Toast -->
<div class="a-toast" id="a-toast">
  <div class="a-toast-dot" id="a-toast-dot"></div>
  <span id="a-toast-msg"></span>
</div>

<script src="js/admin.js"></script>
</body>
</html>
